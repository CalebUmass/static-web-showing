<!DOCTYPE html>
<html>

<head>
    <title>Coordinate Converter</title>
    <link href="converterstyling.css" rel="stylesheet">
    <!--Links to fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
</head>

<body>

    <!-- Back to homepage (back arrow)-->
    <a href="../projects/projects-page.html" class="back-arrow">
        <span class="arrow-icon">&#8592;</span> Back
    </a>

    <!-- Input Form -->
    <div class="container">
        <!-- Input Section -->
        <div class="pages" id="input" style="display: flex;">
            <div id="bg-container">
                <h2 id="heading1">Coordinates to Projected Coordinates</h2>
            </div>
            <div class="glass-card" id="inputbox">
                <!--Class glass-card is used to stylize all "glass card" objects (the translucent containers)-->
                <h3 class="input-subheading">Input coordinates to get projected coordinates.</h3>
                <!--Heading within glass card-->
                <form id="inputform"> <!--This form accepts all the coordinates to convert-->
                    <div class="input-field">
                        <label for="xcoord">x-coordinate:</label>
                        <input type="number" name="xcoord" id="xcoord" step="any" required>
                        <!--Input type is number so that users can only enter valid coordinates. Has required so that both boxes need to be filled in order for form to submit (makes it harder to break the code)-->
                    </div>
                    <div class="input-field">
                        <label for="ycoord">y-coordinate:</label>
                        <input type="number" name="ycoord" id="ycoord" step="any" required>
                    </div>
                    <input type="submit" id="submit" value="Submit">
                    <!--The submit button. This triggers the code in conversionsonefunction.js, so do not change any info about it unless you also update it in the JS-->
                </form>
            </div>
        </div>

        <!-- Output Section --> <!--This appears after the JS code has run.-->
        <div class="pages" id="output" style="display: none;">
            <div id="bg-container"></div> <!--background image only-->
            <div class="output-columns">

                <div class="glass-card">
                    <h3 class="card-title">Local</h3>
                    <div class="coord-block">   
                        <h4>Site Grid</h4>
                        <div id="input-display"></div>
                        <button type="button" class="copy-btn" onclick="copyText('input-display', this)">Copy</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="card-title">WGS84</h3>
                    <div class="coord-block">
                        <h4>Poggio Civitate</h4>
                        <div id="wgs-display"></div>
                        <button type="button" class="copy-btn" onclick="copyText('wgs-display', this)">Copy</button>
                    </div>
                    <div class="coord-block">
                        <h4>Vescovado di Murlo</h4>
                        <div id="Vwgs-display"></div>
                        <button type="button" class="copy-btn" onclick="copyText('Vwgs-display', this)">Copy</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="card-title">EPSG:3003</h3>
                    <div class="coord-block">
                        <h4>Poggio Civitate</h4>
                        <div id="espg-display"></div>
                        <button type="button" class="copy-btn" onclick="copyText('espg-display', this)">Copy</button>
                    </div>
                    <div class="coord-block">
                        <h4>Vescovado di Murlo</h4>
                        <div id="Vespg-display"></div>
                        <button type="button" class="copy-btn" onclick="copyText('Vespg-display', this)">Copy</button>
                    </div>
                </div>

            </div>
            <button id="newsearch" onclick="switchToInput()">New Search</button>
        </div>
    </div>
    </div>

    <!--LOADER-->
    <div id="loader-overlay" class="loader-overlay" style="display: none;">
        <!--Display is none so that the loader is hidden until needed-->
        <div class="loader">
            <div class="loader-inner"></div>
        </div>
    </div>

    <script src="conversionsonefunction.js"></script>
    <script>
        document.getElementById("inputform").addEventListener("submit", convert); //this calls the convert function (in the conversionsonefunction.js script
    </script>
    <script>
        //this function switches the user back to the input screen
        function switchToInput() {
            document.getElementById("output").style.display = "none"; //it hides the output screen
            document.getElementById("input").style.display = "flex"; //it displays the input screen again
        }
    </script>
</body>

</html>
